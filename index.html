<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #4285F4; --bg: #f8f9fa; --card: #ffffff; --text: #202124; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        
        .container { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card); width: 100%; max-width: 450px; padding: 32px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); text-align: center; }
        
        h2 { font-weight: 700; color: var(--text); margin-bottom: 24px; font-size: 24px; }
        .task-list { text-align: left; margin: 20px 0; }
        .task { border: 1px solid #dadce0; padding: 16px 20px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; font-weight: 500; color: #3c4043; }
        .task:hover { border-color: var(--blue); background: #f1f3f4; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="card">
        <h2>VERIFIKASI</h2>
        <div class="task-list" id="taskList"></div>
        <button class="btn" id="finalBtn" style="display:none;" onclick="window.location.href=atob(params.get('v'))">AKSES LINK TUJUAN</button>
    </div>
</div>

<script>
    /* EDIT LINK DI SINI */
    const links = [
        "https://youtube.com/@dickynews",
        "https://www.youtube.com/@GODickyNews",
        "https://www.instagram.com/dickynews",
        "https://www.tiktok.com/@dickynewsyt",
        "https://www.facebook.com/dickynews45"
    ];

    /* PARTIKEL MASSIVE & HALUS */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function animate() {
        ctx.fillStyle = 'rgba(248, 249, 250, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Spawn ribuan bintang dari berbagai arah
        if(Math.random() < 0.5) {
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            stars.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1 });
        }
        
        stars.forEach((s, i) => {
            s.x += s.vx; s.y += s.vy; s.life -= 0.01;
            ctx.beginPath();
            ctx.strokeStyle = `rgba(66, 133, 244, ${s.life})`;
            ctx.lineWidth = 1.5;
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.vx, s.y - s.vy);
            ctx.stroke();
            if(s.life <= 0) stars.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    /* RENDER TASK */
    const tasks = ["Subscribe YT Utama", "Subscribe YT Kedua", "Follow Instagram", "Follow TikTok", "Follow Facebook"];
    const container = document.getElementById("taskList");
    tasks.forEach((t, i) => {
        let div = document.createElement("div");
        div.className = "task";
        div.innerHTML = `<i class="fab fa-youtube" style="margin-right:15px"></i> ${t}`;
        div.onclick = () => { window.open(links[i], "_blank"); div.style.background = "#e8f0fe"; };
        container.appendChild(div);
    });
</script>
</body>
</html>
