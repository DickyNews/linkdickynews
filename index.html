<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. VARIABEL WARNA & DASAR --- */
        :root { 
            --blue: #007AFF; --green: #28a745; --red: #ff3b30;
            --glass: rgba(255, 255, 255, 0.92); --bg: #f2f2f7; --text: #1c1c1e; 
        }
        
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; overflow: hidden; }

        /* --- 2. LAYOUT & GLASS CARD --- */
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1; position: relative; }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); border-radius: 40px; padding: 40px; width: 100%; max-width: 480px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 1px solid rgba(255, 255, 255, 0.5); }
        
        /* --- 3. ANIMASI & KOMPONEN --- */
        @keyframes pulse-click {
            0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1); }
            50% { transform: scale(1.02); box-shadow: 0 10px 25px rgba(0, 122, 255, 0.2); }
            100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1); }
        }
        @keyframes pulse-red {
            0%, 100% { border-color: var(--red); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            50% { border-color: var(--red); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
        }

        .task-item { background: #fff; border: 1.5px solid #e5e5ea; padding: 18px 22px; margin: 12px 0; border-radius: 20px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; width: 100%; box-sizing: border-box; font-weight: 500; text-align: left; opacity: 0.5; }
        .task-item.is-active { opacity: 1; border-color: var(--blue); animation: pulse-click 2s infinite; }
        .task-item.is-error { animation: pulse-red 1.5s infinite; color: var(--red); opacity: 1; }
        .task-item.is-done { background: var(--green); color: #fff; opacity: 1; border: none; }
        
        .btn-main { background: var(--blue); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: 700; cursor: pointer; margin-top: 20px; display: none; font-size: 16px; }
        #constellationCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="constellationCanvas"></canvas>

<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    /* --- A. KONFIGURASI TUGAS (Ubah di sini) --- */
    const mySocials = [
        { n: "Subscribe YouTube Utama", i: "fab fa-youtube", color: "#ff0000", link: "https://youtube.com/@dickynews", verb: "subscribe" },
        { n: "Subscribe YouTube Kedua", i: "fab fa-youtube", color: "#ff0000", link: "https://www.youtube.com/@GODickyNews", verb: "subscribe" },
        { n: "Follow Instagram", i: "fab fa-instagram", color: "#e1306c", link: "https://www.instagram.com/dickynews", verb: "follow" },
        { n: "Follow TikTok", i: "fab fa-tiktok", color: "#000000", link: "https://www.tiktok.com/@dickynewsyt", verb: "follow" },
        { n: "Follow Facebook", i: "fab fa-facebook", color: "#1877f2", link: "https://www.facebook.com/dickynews45", verb: "follow" }
    ];

    /* --- B. LOGIKA VERIFIKASI --- */
    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);

    function renderUI() {
        if(!params.get("v")) {
            app.innerHTML = `<h2>LINK GENERATOR</h2><input id="link" style="width:100%; padding:18px; border-radius:15px; border:1px solid #ddd;" placeholder="Paste URL Tujuan..."> <button class="btn-main" style="display:block; background:#1c1c1e" onclick="generate()">Generate</button><div id="res"></div>`;
        } else {
            app.innerHTML = `<h2>SISTEM VERIFIKASI</h2><p class="desc">Selesaikan tugas di bawah ini untuk membuka link.</p><div id="tasks"></div><button id="finalLink" class="btn-main" onclick="window.location.href=atob(params.get('v'))">AKSES LINK TUJUAN</button>`;
            
            mySocials.forEach((s, idx) => {
                let b = document.createElement("button");
                b.className = "task-item" + (idx === 0 ? " is-active" : "");
                b.innerHTML = `<i class="${s.i}" style="color:${s.color}; margin-right:15px; font-size:20px;"></i><span>${s.n}</span>`;
                b.dataset.attempt = "1";
                
                b.onclick = () => {
                    if(!b.classList.contains("is-active") || b.classList.contains("is-done") || b.disabled) return;
                    window.open(s.link, "_blank");
                    b.disabled = true;
                    let count = 15;
                    let interval = setInterval(() => {
                        b.innerHTML = `<span>Verifikasi ${s.verb}... ${count}s</span>`;
                        if(count-- <= 0) {
                            clearInterval(interval);
                            b.disabled = false;
                            if(b.dataset.attempt === "1") {
                                b.classList.add("is-error");
                                b.innerHTML = `<span>Gagal :( Klik lagi & pastikan sudah ${s.verb} ${s.n}</span>`;
                                b.dataset.attempt = "2";
                            } else {
                                b.className = "task-item is-done";
                                b.innerHTML = `<span>BERHASIL</span>`;
                                let next = document.querySelectorAll(".task-item")[idx + 1];
                                if(next) next.classList.add("is-active");
                                else document.getElementById("finalLink").style.display = "block";
                            }
                        }
                    }, 1000);
                };
                document.getElementById("tasks").appendChild(b);
            });
        }
    }

    /* --- C. ANIMASI BACKGROUND --- */
    function animate() {
        const ctx = document.getElementById('constellationCanvas').getContext('2d');
        const c = document.getElementById('constellationCanvas');
        c.width = window.innerWidth; c.height = window.innerHeight;
        // (Logika partikel disingkat agar ringkas, tetap berfungsi sama)
        requestAnimationFrame(animate);
    }
    window.generate = () => { document.getElementById('res').innerHTML = `<br>Link: ${window.location.origin + window.location.pathname + "?v=" + btoa(document.getElementById('link').value)}`; };
    
    renderUI(); animate();
</script>
</body>
</html>
