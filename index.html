<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ios-blue: #007AFF; --glass: rgba(255, 255, 255, 0.85); --bg: #f2f2f7; --text: #1c1c1e; --green: #28a745; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #constellationCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.3); }

        .task-item { background: #fff; border: 2px solid #e5e5ea; padding: 18px; margin: 15px 0; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; opacity: 0.6; transition: 0.4s; }
        .task-item.is-active { opacity: 1; border-color: var(--ios-blue); }
        .task-item.is-done { opacity: 1; background: var(--green); border: none; color: #fff; }
        .btn-main { background: var(--ios-blue); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; }
        .yt { color: #ff0000; } .ig { color: #e1306c; } .tk { color: #000000; } .fb { color: #1877f2; }
    </style>
</head>
<body>

<canvas id="constellationCanvas"></canvas>
<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    const canvas = document.getElementById('constellationCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function animate() {
        ctx.fillStyle = 'rgba(242, 242, 247, 0.2)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if(Math.random() < 0.3) {
            let side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            if(side === 0) { x = Math.random()*canvas.width; y = -10; vx = (Math.random()-0.5)*10; vy = Math.random()*15; }
            else if(side === 1) { x = Math.random()*canvas.width; y = canvas.height+10; vx = (Math.random()-0.5)*10; vy = -Math.random()*15; }
            else if(side === 2) { x = -10; y = Math.random()*canvas.height; vx = Math.random()*15; vy = (Math.random()-0.5)*10; }
            else { x = canvas.width+10; y = Math.random()*canvas.height; vx = -Math.random()*15; vy = (Math.random()-0.5)*10; }
            
            stars.push({ x, y, vx, vy, size: Math.random()*3 + 1, color: `hsl(${Math.random()*360}, 70%, 60%)` });
        }
        
        stars.forEach((s, i) => {
            s.x += s.vx; s.y += s.vy;
            ctx.beginPath();
            ctx.strokeStyle = s.color;
            ctx.lineWidth = s.size;
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.vx * 1.5, s.y - s.vy * 1.5);
            ctx.stroke();
            if(s.x < -50 || s.x > canvas.width+50 || s.y < -50 || s.y > canvas.height+50) stars.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    const mySocials = [
        { n: "Subscribe YT Utama", i: "fab fa-youtube yt", action: "subscribe" },
        { n: "Subscribe YT Kedua", i: "fab fa-youtube yt", action: "subscribe" },
        { n: "Follow Instagram", i: "fab fa-instagram ig", action: "follow" },
        { n: "Follow TikTok", i: "fab fa-tiktok tk", action: "follow" },
        { n: "Follow Facebook", i: "fab fa-facebook fb", action: "follow" }
    ];
    const links = [
        "https://youtube.com/@dickynews", "https://www.youtube.com/@GODickyNews",
        "https://www.instagram.com/dickynews", "https://www.tiktok.com/@dickynewsyt",
        "https://www.facebook.com/dickynews45"
    ];

    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    function renderUI() {
        if(!params.get("v")) {
            app.innerHTML = `<h2>LINK GENERATOR</h2><input id="link" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin:10px 0; box-sizing:border-box;" placeholder="Paste URL Tujuan..."> <button class="btn-main" style="display:block; background:#1c1c1e" onclick="generate()">Generate Link</button><div id="res"></div>`;
        } else {
            app.innerHTML = `<h2>VERIFIKASI</h2><p>Selesaikan langkah-langkah di bawah ini untuk membuka link WhatsApp Mod.</p><div id="tasks"></div><button id="finalLink" class="btn-main" onclick="window.location.href=atob(params.get('v'))">AKSES LINK TUJUAN</button>`;
            const tasksContainer = document.getElementById("tasks");
            mySocials.forEach((s, idx) => {
                let b = document.createElement("button");
                b.className = "task-item";
                if(idx === 0) b.classList.add("is-active");
                b.innerHTML = `<span><i class="${s.i}" style="margin-right:10px"></i> ${s.n}</span>`;
                b.onclick = () => {
                    window.open(links[idx], "_blank");
                    b.disabled = true;
                    let count = 15;
                    let timer = setInterval(() => {
                        b.innerHTML = `Memverifikasi... ${count}s`;
                        if(--count < 0) {
                            clearInterval(timer);
                            if(!b.dataset.fail) {
                                b.dataset.fail = "true";
                                b.classList.add("is-error");
                                b.innerHTML = `Kamu belum ${s.action} :( Klik untuk coba lagi.`;
                                b.disabled = false;
                            } else {
                                b.classList.remove("is-active", "is-error");
                                b.classList.add("is-done");
                                b.innerHTML = `<span><i class="fas fa-check" style="margin-right:10px"></i> BERHASIL</span>`;
                                let nextBtn = document.querySelectorAll(".task-item")[idx + 1];
                                if(nextBtn) nextBtn.classList.add("is-active");
                                else document.getElementById("finalLink").style.display = "block";
                            }
                        }
                    }, 1000);
                };
                tasksContainer.appendChild(b);
            });
        }
    }
    window.generate = () => { 
        let url = document.getElementById('link').value;
        if(url) document.getElementById('res').innerHTML = `<p style="font-size:12px; margin-top:15px; word-break:break-all;">Link:<br>${window.location.origin + window.location.pathname}?v=${btoa(url)}</p>`;
    };
    renderUI();
</script>
</body>
</html>
