<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Ganda - Dicky News</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }

        /* Tampilan Kolom Gagal */
        .alert-gagal {
            position: relative;
            background: #fff5f5;
            border: 2px solid #ff4d4d;
            color: #ff4d4d;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            overflow: hidden;
            display: flex; /* Default tampil */
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            animation: pulse-aura 2s infinite ease-in-out;
            z-index: 1;
        }

        .alert-gagal::before {
            content: '';
            position: absolute;
            inset: -20px;
            background-image: radial-gradient(circle, #ff4d4d 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            opacity: 0.2;
            z-index: -1;
            animation: star-rotate 15s linear infinite;
        }

        @keyframes pulse-aura {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 10px 5px rgba(255, 77, 77, 0.3); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        @keyframes star-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* List Misi */
        .item { padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="container" id="mainContent">
        <h2>Verifikasi Ganda</h2>
        <p>Selesaikan langkah untuk membuka link.</p>
        <br>

        <div class="alert-gagal" id="btnGagal" onclick="verify()">
            <i class="fas fa-exclamation-circle"></i>
            <span>Gagal! Klik ulang Subscribe YT Utama</span>
        </div>

        <div class="item"><span>Subscribe YT Kedua</span><i class="fas fa-lock"></i></div>
        <div class="item"><span>Follow Instagram</span><i class="fas fa-lock"></i></div>
    </div>

    <script>
        // Cek status saat halaman dimuat
        const box = document.getElementById('btnGagal');
        
        // Jika sudah pernah diverifikasi, hilangkan box gagal
        if (localStorage.getItem('verified') === 'true') {
            box.style.display = 'none';
        }

        function verify() {
            // Arahkan ke link tujuan
            window.open('https://youtube.com/@ChannelAnda', '_blank');
            
            // Simpan status sukses
            localStorage.setItem('verified', 'true');
            
            // Sembunyikan box
            box.style.display = 'none';
        }
    </script>
</body>
</html>
