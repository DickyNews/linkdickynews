<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dicky News | Premium Link Unlocker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* --- 1. TEMA & DESAIN --- */
:root {
  --blue: #007AFF;
  --green: #28a745;
  --red: #ff3b30;
  --bg: #f2f2f7;
}

body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background: var(--bg);
  overflow: hidden;
}

/* --- 2. CANVAS ANIMASI --- */
#constCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* --- 3. KARTU UTAMA --- */
.container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.glass-card {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  padding: 30px;
  width: 100%;
  max-width: 450px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

/* --- 4. TOMBOL TUGAS --- */
.task-item {
  display: flex;
  align-items: center;
  padding: 18px;
  margin: 12px 0;
  border-radius: 20px;
  border: 2px solid #ddd;
  background: white;
  cursor: pointer;
  transition: 0.3s;
  opacity: 0.5;
}

.task-item.is-active {
  opacity: 1;
  border-color: var(--blue);
  box-shadow: 0 5px 15px rgba(0, 122, 255, 0.1);
}

.task-item.is-done {
  background: var(--green);
  color: white;
  border: none;
  opacity: 1;
}

.task-item.is-error {
  border-color: var(--red);
  color: var(--red);
  opacity: 1;
}
</style>
</head>

<body>
<canvas id="constCanvas"></canvas>

<div class="container">
  <div class="glass-card" id="app"></div>
</div>

<script>
/* --- KONFIGURASI TUGAS --- */
const tasks = [
  { n: "Subscribe YT Utama", link: "https://youtube.com/@dickynews", verb: "subscribe" },
  { n: "Subscribe YT Kedua", link: "https://youtube.com/@GODickyNews", verb: "subscribe" },
  { n: "Follow Instagram", link: "https://instagram.com/dickynews", verb: "follow" }
];

/* --- LOGIKA SISTEM --- */
const app = document.getElementById("app");
const params = new URLSearchParams(window.location.search);

function render() {
  // Mode Generator
  if(!params.get("v")) {
    app.innerHTML = `<h2>Generator Link</h2>
    <input id='url' style='width:100%; padding:10px; margin:10px 0;'>
    <button onclick='generate()' style='width:100%; padding:10px;'>Buat Link</button>
    <div id='res'></div>`;
  } 
  // Mode Verifikasi
  else {
    app.innerHTML = `<h2>SISTEM VERIFIKASI</h2>`;
    tasks.forEach((t, i) => {
      let b = document.createElement("div");
      b.className = "task-item" + (i === 0 ? " is-active" : "");
      b.innerHTML = `<span>${t.n}</span>`;
      b.dataset.state = "start";
      
      b.onclick = () => {
        if(b.classList.contains("is-done") || b.disabled) return;
        window.open(t.link, "_blank");
        b.disabled = true;
        let s = 15;
        let timer = setInterval(() => {
          b.innerHTML = `Verifikasi ${t.verb}... ${s}s`;
          if(s-- <= 0) {
            clearInterval(timer);
            b.disabled = false;
            if(b.dataset.state === "start") {
              b.className = "task-item is-error";
              b.innerHTML = `Gagal! Klik lagi & ${t.verb} ${t.n}`;
              b.dataset.state = "retry";
            } else {
              b.className = "task-item is-done";
              b.innerHTML = `BERHASIL`;
              if(app.children[i+1]) app.children[i+1].classList.add("is-active");
            }
          }
        }, 1000);
      };
      app.appendChild(b);
    });
  }
}

function generate() {
  let url = document.getElementById('url').value;
  let res = window.location.origin + window.location.pathname + "?v=" + btoa(url);
  document.getElementById('res').innerText = res;
}

render();
</script>
</body>
</html>
