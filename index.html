<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicky News | Premium Link Unlocker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --glass: rgba(255, 255, 255, 0.7); 
            --bg: #050505; 
        }
        body { margin: 0; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: white; overflow: hidden; }
        
        /* Animasi Rasi Bintang Unlimited */
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* Efek Kaca iOS Terbaru */
        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 30px; width: 100%; max-width: 450px; text-align: center;
        }

        .task-item { 
            background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; margin: 10px 0; border-radius: 15px; display: flex; 
            align-items: center; justify-content: space-between; cursor: pointer;
            transition: all 0.4s ease; opacity: 0.6; pointer-events: none;
        }
        
        .task-item.is-active { 
            opacity: 1; pointer-events: auto; border: 2px solid var(--ios-blue); 
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.3);
        }
        
        .task-item.is-done { background: #28a745; opacity: 1; }
        
        .btn-main { 
            background: var(--ios-blue); color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="stars"></div>
<div class="container">
    <div class="glass-card" id="app"></div>
</div>

<script>
    const mySocials = [
        { n: "Subscribe YT Utama", i: "fab fa-youtube", action: "subscribe" },
        { n: "Subscribe YT Kedua", i: "fab fa-youtube", action: "subscribe" },
        { n: "Follow Instagram", i: "fab fa-instagram", action: "follow" },
        { n: "Follow TikTok", i: "fab fa-tiktok", action: "follow" },
        { n: "Follow Facebook", i: "fab fa-facebook", action: "follow" }
    ];
    
    // Logika render (Sama seperti sebelumnya, disesuaikan dengan CSS baru)
    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById("app");

    function renderUI() {
        if(!params.get("v")) {
            app.innerHTML = `<h2>LINK GENERATOR</h2><input id="link" style="width:100%; padding:15px; border-radius:15px; border:none; margin:10px 0;" placeholder="Paste URL Tujuan..."> <button class="btn-main" onclick="generate()">Generate Link</button><div id="res"></div>`;
        } else {
            app.innerHTML = `<h2>VERIFIKASI</h2><p>Selesaikan langkah-langkah di bawah ini:</p><div id="tasks"></div><button id="finalLink" class="btn-main" style="display:none" onclick="window.location.href=atob(params.get('v'))">AKSES LINK TUJUAN</button>`;
            
            mySocials.forEach((s, idx) => {
                let b = document.createElement("div");
                b.className = "task-item";
                if(idx === 0) b.classList.add("is-active");
                b.innerHTML = `<span><i class="${s.i}"></i> ${s.n}</span> <i class="fas fa-lock"></i>`;
                b.onclick = () => { /* Logika sama seperti sebelumnya */ };
                document.getElementById("tasks").appendChild(b);
            });
        }
    }
    renderUI();
</script>
</body>
</html>
